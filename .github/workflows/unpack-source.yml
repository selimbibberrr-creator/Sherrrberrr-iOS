name: Unpack SherrrBerrr 1.0 release source

on:
  push:
    paths:
      - '.sourcepack/**'
      - '.github/workflows/unpack-source.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct and unpack release source
        shell: bash
        run: |
          set -euo pipefail
          cat .sourcepack/part* | base64 -d > /tmp/sherrrberrr-source.tar.xz
          tar -xJf /tmp/sherrrberrr-source.tar.xz -C .
          python3 tools/validate_ios_1_0.py
      - name: Commit clean release tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .sourcepack
          rm -f .github/workflows/unpack-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Unpack SherrrBerrr iOS 1.0 release source"
          git push
